appId: com.scamp.app
productName: Scamp
directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/{test,__tests__,tests}/**"
  - "!node_modules/**/*.{md,ts,map}"

# Native modules (node-pty) need to be rebuilt for the target platform.
npmRebuild: true

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip

win:
  target:
    - nsis
    - portable

linux:
  category: Development
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
